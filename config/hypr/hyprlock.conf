$font = Monospace

general {
    hide_cursor = true
}

# uncomment to enable fingerprint authentication
auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250 # in milliseconds
    }
}

# BACKGROUND
background {
    monitor =
    path = ~/.dotfiles/assets/bg.png   # supports png, jpg, webp (no animations)
    color = rgba(25, 20, 20, 1.0)

    blur_passes = 2 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}


animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# background {
#     monitor =
#     path = screenshot
#     blur_passes = 3
# }

input-field {
    monitor = eDP-1
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgb(6e96a3)
    check_color = rgb(00ff99)
    fail_color = rgb(ff6633)

    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 5

    font_family = $font
    font_size = 24

    placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

input-field {
    monitor = HDMI-A-1
    size = 18%, 4%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgb(6e96a3)
    check_color = rgb(00ff99)
    fail_color = rgb(ff6633)

    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 5

    font_family = $font

    font_size = 16

    placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -100
    halign = center
    valign = center
}

# TIME
label {
    monitor = eDP-1
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 220
    font_family = JetBrains Mono ExtraBold
    position = 0, -400
    halign = center
    valign = top
}

# TIME
label {
    monitor = HDMI-A-1
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = 0, -200
    halign = center
    valign = top
}

# DATE
label {
    monitor = eDP-1
    text = cmd[update:60000] date +"%Y.%m.%d." # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 10, -5
    # position = 0, -800
    halign = left
    valign = top
}

# DATE
label {
    monitor = HDMI-A-1
    text = cmd[update:60000] date +"%Y.%m.%d." # update every 60 seconds
    font_size = 14
    font_family = $font

    position = 10, -5
    # position = 0, -800
    halign = left
    valign = top
}

# Keyboard layout
label {
    monitor = eDP-1
    text = $LAYOUT[EN,HU]
    onclick = hyprctl switchxkblayout all next

    font_size = 24

    position = 0, -150
    halign = center
    valign = center
}

# Keyboard layout
label {
    monitor = HDMI-A-1
    text = $LAYOUT[EN,HU]
    onclick = hyprctl switchxkblayout all next

    font_size = 14

    position = 0, -150
    halign = center
    valign = center
}

