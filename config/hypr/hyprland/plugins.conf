exec-once = hyprpm reload
# && hyprctl dispatch exec "sleep 1 && hyprctl keyword source ~/.dotfiles/config/hypr/hyprland/navigation-split.conf"

# This will toggle HyprExpo when SUPER+g is pressed
bind = SUPER, g, hyprexpo:expo, toggle

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = first # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
}
